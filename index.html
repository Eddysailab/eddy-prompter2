<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EddyPrompter</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    #app {
      width: 100%;
      max-width: 380px;
      height: 100vh;
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
    }

    /* Screens */
    .screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* Header */
    .app-header {
      flex-shrink: 0;
      padding: 16px;
      background: #0a0a0a;
      border-bottom: 2px solid #39FF14;
      text-align: center;
      position: relative;
      z-index: 5;
    }
    .logo {
      font-family: 'Courier New', Courier, monospace;
      font-size: 22px;
      font-weight: bold;
      color: #39FF14;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(57,255,20,0.8), 0 0 20px rgba(57,255,20,0.4);
    }
    .back-btn {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #39FF14;
      font-size: 24px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Content */
    .screen-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Library */
    .script-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 100px;
    }
    .script-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(57,255,20,0.2);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .script-card:active {
      background: rgba(57,255,20,0.06);
      border-color: rgba(57,255,20,0.5);
    }
    .card-info h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }
    .card-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      font-family: 'Courier New', monospace;
    }
    .card-actions {
      display: flex;
      gap: 8px;
    }
    .card-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(57,255,20,0.1);
      color: #39FF14;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .card-btn:active { transform: scale(0.92); }
    .card-btn.delete { background: rgba(255,68,68,0.1); color: #ff4444; }

    .fab {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #39FF14;
      color: #0a0a0a;
      border: none;
      padding: 16px 32px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      box-shadow: 0 4px 24px rgba(57,255,20,0.35);
      cursor: pointer;
      z-index: 10;
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .fab:active { transform: translateX(-50%) scale(0.96); }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.4);
    }
    .empty-state.hidden { display: none; }
    .empty-graphic {
      width: 80px;
      height: 100px;
      margin: 0 auto 24px;
      border: 2px solid #39FF14;
      border-radius: 8px;
      position: relative;
      box-shadow: 0 0 20px rgba(57,255,20,0.15);
      opacity: 0.6;
    }
    .empty-graphic::before {
      content: '';
      position: absolute;
      top: 24px;
      left: 14px;
      right: 14px;
      height: 2px;
      background: #39FF14;
      box-shadow: 0 12px 0 #39FF14, 0 24px 0 #39FF14, 0 36px 0 #39FF14;
    }

    /* Editor */
    #edit-title {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 10px;
      padding: 14px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
    }
    #edit-title:focus { border-color: #39FF14; }
    #edit-body {
      width: 100%;
      flex: 1;
      min-height: 180px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 10px;
      padding: 14px;
      color: #fff;
      font-size: 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      font-family: system-ui, sans-serif;
    }
    #edit-body:focus { border-color: #39FF14; }

    .settings-panel {
      margin: 16px 0;
      border: 1px solid rgba(57,255,20,0.15);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }
    .settings-toggle {
      padding: 14px;
      background: rgba(57,255,20,0.08);
      color: #39FF14;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .settings-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .settings-content.collapsed { display: none; }
    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .setting-row label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }
    .setting-row input[type="range"] {
      width: 100%;
    }
    .setting-value {
      font-family: 'Courier New', monospace;
      color: #39FF14;
      font-size: 13px;
    }
    .segmented-control {
      display: flex;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .seg-btn {
      flex: 1;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      padding: 10px 4px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    .seg-btn.active {
      background: #39FF14;
      color: #0a0a0a;
    }
    .editor-preview {
      padding: 16px;
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
      text-align: center;
      color: rgba(255,255,255,0.7);
      border: 1px dashed rgba(57,255,20,0.2);
      margin-top: 4px;
      line-height: 1.5;
    }

    .editor-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 16px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      min-height: 44px;
      transition: transform 0.1s;
    }
    .btn-primary {
      background: #39FF14;
      color: #0a0a0a;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-primary:active, .btn-secondary:active { transform: scale(0.97); }

    .validation {
      color: #ff4444;
      padding: 10px 14px;
      background: rgba(255,68,68,0.08);
      border-radius: 8px;
      margin: 4px 0 12px;
      font-size: 13px;
      border: 1px solid rgba(255,68,68,0.2);
    }
    .validation.hidden { display: none; }

    /* Prompter */
    .camera-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 1;
    }
    #camera-feed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .camera-off {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      padding: 14px 22px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    .camera-off.hidden { display: none; }

    .prompter-overlay {
      position: absolute;
      width: 90%;
      height: 42%;
      left: 5%;
      top: 28%;
      background: rgba(0,0,0,0.65);
      border: 2px solid #39FF14;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(57,255,20,0.1);
    }

    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(0,0,0,0.45);
      border-bottom: 1px solid rgba(57,255,20,0.2);
      cursor: grab;
      flex-shrink: 0;
    }
    .overlay-header:active { cursor: grabbing; }
    .drag-handle {
      color: #39FF14;
      font-size: 18px;
      letter-spacing: 2px;
      opacity: 0.7;
      font-weight: bold;
    }
    .word-count-remaining {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'Courier New', monospace;
    }

    .overlay-content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .focus-line {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 2px;
      background: rgba(57,255,20,0.35);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 3;
      box-shadow: 0 0 8px rgba(57,255,20,0.2);
    }
    .text-fade {
      position: absolute;
      left: 0; right: 0;
      height: 50px;
      pointer-events: none;
      z-index: 2;
    }
    .text-fade.top {
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    }
    .text-fade.bottom {
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    }
    .script-text {
      padding: 0 16px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
      will-change: transform;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .script-text.mirror { transform: scaleX(-1); }
    .word {
      display: inline;
      transition: color 0.12s ease, text-shadow 0.12s ease;
      margin-right: 0.3em;
    }
    .word.active {
      color: #39FF14;
      text-shadow: 0 0 10px rgba(57,255,20,0.7), 0 0 20px rgba(57,255,20,0.35);
      font-weight: 600;
    }
    .word.stumbled {
      color: #ffaa44;
      text-decoration: underline wavy #ffaa44;
      text-underline-offset: 3px;
    }

    .resize-handle {
      position: absolute;
      bottom: 0; right: 0;
      width: 28px;
      height: 28px;
      cursor: nwse-resize;
      z-index: 11;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 6px; right: 6px;
      width: 10px; height: 10px;
      border-right: 2px solid #39FF14;
      border-bottom: 2px solid #39FF14;
      opacity: 0.7;
    }

    /* Control Bar */
    .control-bar {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      background: rgba(10,10,10,0.96);
      border-top: 1px solid rgba(57,255,20,0.25);
      padding: 12px 14px;
      z-index: 20;
      backdrop-filter: blur(12px);
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control-row.top {
      margin-bottom: 12px;
      justify-content: space-between;
    }
    .mini-logo {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #39FF14;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
    }
    .timer {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      color: #39FF14;
      min-width: 50px;
      text-align: center;
      letter-spacing: 1px;
    }
    .progress-container {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 6px;
    }
    .progress-bar {
      height: 100%;
      background: #39FF14;
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(57,255,20,0.5);
    }
    .rehearsal-toggle {
      display: flex;
      align-items: center;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      font-weight: 600;
    }
    .toggle-label input {
      accent-color: #39FF14;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .control-row.bottom {
      justify-content: space-between;
    }
    .control-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(57,255,20,0.35);
      background: rgba(57,255,20,0.08);
      color: #39FF14;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      flex-shrink: 0;
    }
    .control-btn:active { transform: scale(0.9); background: rgba(57,255,20,0.15); }
    .control-btn.recording {
      background: rgba(255,68,68,0.15);
      border-color: #ff4444;
      color: #ff4444;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50% { opacity: 0.75; box-shadow: 0 0 0 8px rgba(255,68,68,0); }
    }
    .speed-control {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }
    .speed-control label {
      font-size: 9px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .speed-control input[type="range"] { width: 100%; }

    /* Range Input Styling */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: #39FF14;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(57,255,20,0.5);
      border: 2px solid #0a0a0a;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      background: #39FF14;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #0a0a0a;
      box-shadow: 0 0 12px rgba(57,255,20,0.5);
    }

    /* Scrollbar */
    .screen-content::-webkit-scrollbar { width: 4px; }
    .screen-content::-webkit-scrollbar-thumb {
      background: rgba(57,255,20,0.3);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Screen 1: Library -->
    <div id="screen-library" class="screen active">
      <header class="app-header">
        <div class="logo">EddyPrompter</div>
      </header>
      <div class="screen-content">
        <div id="script-list" class="script-list"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-graphic"></div>
          <p style="font-size: 16px; margin-bottom: 8px;">No scripts yet</p>
          <p style="font-size: 13px;">Tap + New Script to begin</p>
        </div>
      </div>
      <button id="btn-new-script" class="fab">+ New Script</button>
    </div>

    <!-- Screen 2: Editor -->
    <div id="screen-editor" class="screen">
      <header class="app-header">
        <button id="btn-back" class="back-btn">←</button>
        <div class="logo" style="font-size: 18px;">Edit Script</div>
        <div style="width: 44px;"></div>
      </header>
      <div class="screen-content">
        <input type="text" id="edit-title" placeholder="Script Title" autocomplete="off">
        <textarea id="edit-body" placeholder="Paste your script here..."></textarea>

        <div class="settings-panel">
          <div class="settings-toggle" id="settings-toggle">⚙ Settings <span>▼</span></div>
          <div class="settings-content collapsed" id="settings-content">
            <div class="setting-row">
              <label>Font Size <span class="setting-value" id="font-size-val">24px</span></label>
              <input type="range" id="font-size" min="16" max="60" value="24">
              <div class="editor-preview" id="editor-preview" style="font-size: 24px;">The quick brown fox jumps over the lazy dog.</div>
            </div>
            <div class="setting-row">
              <label>Scroll Speed <span class="setting-value" id="scroll-speed-val">5</span></label>
              <input type="range" id="scroll-speed" min="1" max="10" value="5">
            </div>
            <div class="setting-row">
              <label>Direction</label>
              <div class="segmented-control">
                <button class="seg-btn active" data-dir="tb">Top→Bottom</button>
                <button class="seg-btn" data-dir="bt">Bottom→Top</button>
              </div>
            </div>
            <div class="setting-row">
              <label>Alignment</label>
              <div class="segmented-control">
                <button class="seg-btn active" data-align="left">Left</button>
                <button class="seg-btn" data-align="center">Center</button>
                <button class="seg-btn" data-align="right">Right</button>
              </div>
            </div>
          </div>
        </div>

        <div id="validation-msg" class="validation hidden">Script body cannot be empty</div>

        <div class="editor-actions">
          <button id="btn-save" class="btn-secondary">Save</button>
          <button id="btn-launch" class="btn-primary">▶ Launch</button>
        </div>
      </div>
    </div>

    <!-- Screen 3: Prompter -->
    <div id="screen-prompter" class="screen">
      <div class="camera-layer">
        <video id="camera-feed" autoplay playsinline muted></video>
        <div id="camera-off-indicator" class="camera-off hidden">Camera off</div>
      </div>

      <div id="prompter-overlay" class="prompter-overlay">
        <div class="overlay-header" id="overlay-header">
          <div class="drag-handle">⋮⋮</div>
          <div class="word-count-remaining" id="words-remaining">0 words left</div>
        </div>
        <div class="overlay-content" id="overlay-content">
          <div class="focus-line"></div>
          <div class="text-fade top"></div>
          <div class="text-fade bottom"></div>
          <div id="script-text" class="script-text"></div>
        </div>
        <div class="resize-handle" id="resize-handle"></div>
      </div>

      <div class="control-bar">
        <div class="control-row top">
          <div class="mini-logo">EddyPrompter</div>
          <div class="timer" id="timer">00:00</div>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div class="rehearsal-toggle">
            <label class="toggle-label">
              <input type="checkbox" id="rehearsal-mode">
              <span>Rehearsal</span>
            </label>
          </div>
        </div>
        <div class="control-row bottom">
          <button id="btn-play" class="control-btn">▶</button>
          <button id="btn-record" class="control-btn">⏺</button>
          <button id="btn-restart" class="control-btn">↺</button>
          <button id="btn-mirror" class="control-btn">🔁</button>
          <div class="speed-control">
            <label>Speed</label>
            <input type="range" id="live-speed" min="1" max="10" value="5">
          </div>
          <button id="btn-camera-toggle" class="control-btn">📷</button>
          <button id="btn-exit" class="control-btn">✕</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ============ IndexedDB ============
      class EddyDB {
        constructor() {
          this.db = null;
          this.dbName = 'eddyprompter_db';
          this.storeName = 'scripts';
          this.version = 1;
        }
        init() {
          return new Promise((resolve, reject) => {
            const req = indexedDB.open(this.dbName, this.version);
            req.onerror = () => reject(req.error);
            req.onsuccess = () => { this.db = req.result; resolve(this.db); };
            req.onupgradeneeded = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains(this.storeName)) {
                db.createObjectStore(this.storeName, { keyPath: 'id', autoIncrement: true });
              }
            };
          });
        }
        getAll() {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(this.storeName, 'readonly');
            const store = tx.objectStore(this.storeName);
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }
        get(id) {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(this.storeName, 'readonly');
            const store = tx.objectStore(this.storeName);
            const req = store.get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }
        put(data) {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(this.storeName, 'readwrite');
            const store = tx.objectStore(this.storeName);
            const req = store.put(data);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
          });
        }
        delete(id) {
          return new Promise((resolve, reject) => {
            const tx = this.db.transaction(this.storeName, 'readwrite');
            const store = tx.objectStore(this.storeName);
            const req = store.delete(id);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }
      }

      const db = new EddyDB();
      let currentScript = null;
      let wordElements = [];
      let timerInterval = null;
      let elapsedSeconds = 0;

      const scrollState = {
        isPlaying: false,
        currentWord: 0,
        speed: 5,
        direction: 'tb',
        lastFrameTime: null,
        scrollTop: 0,
        rafId: null,
        isRehearsal: false,
        stumbledWords: new Set(),
        lastHighlighted: -1
      };

      const cameraState = {
        stream: null,
        facingMode: 'environment'
      };

      const dragState = {
        active: false,
        pending: false,
        startX: 0, startY: 0,
        startLeft: 0, startTop: 0,
        moved: false,
        threshold: 18
      };

      const resizeState = {
        active: false,
        startX: 0, startY: 0,
        startWidth: 0, startHeight: 0
      };

      const recordState = {
        mediaRecorder: null,
        chunks: [],
        isRecording: false
      };

      // ============ Utils ============
      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function getWordCount(text) { return text ? text.split(/\s+/).filter(w => w.length > 0).length : 0; }
      function getReadTime(wc) { return Math.ceil(wc / 130); }
      function formatDate(ts) {
        if (!ts) return '';
        return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
      function escapeHtml(t) {
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
      }

      // ============ Screens ============
      function showScreen(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + name).classList.add('active');
      }

      // ============ Library ============
      async function loadLibrary() {
        const scripts = await db.getAll();
        renderLibrary(scripts);
      }

      function renderLibrary(scripts) {
        const list = document.getElementById('script-list');
        const empty = document.getElementById('empty-state');
        if (scripts.length === 0) {
          list.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');
        list.innerHTML = scripts.map(s => {
          const wc = getWordCount(s.body);
          const rt = getReadTime(wc);
          const date = formatDate(s.updatedAt || s.createdAt);
          return `
            <div class="script-card" data-id="${s.id}">
              <div class="card-info">
                <h3>${escapeHtml(s.title || 'Untitled')}</h3>
                <div class="card-meta">
                  <span>${wc} words</span>
                  <span>${rt} min</span>
                  <span>${date}</span>
                </div>
              </div>
              <div class="card-actions">
                <button class="card-btn play" data-id="${s.id}" aria-label="Play">▶</button>
                <button class="card-btn edit" data-id="${s.id}" aria-label="Edit">✏</button>
                <button class="card-btn delete" data-id="${s.id}" aria-label="Delete">🗑</button>
              </div>
            </div>
          `;
        }).join('');
      }

      document.getElementById('script-list').addEventListener('click', async (e) => {
        const play = e.target.closest('.card-btn.play');
        const edit = e.target.closest('.card-btn.edit');
        const del = e.target.closest('.card-btn.delete');
        if (play) {
          const script = await db.get(parseInt(play.dataset.id));
          if (script) { currentScript = script; launchPrompter(script); }
        } else if (edit) {
          const script = await db.get(parseInt(edit.dataset.id));
          if (script) { currentScript = script; populateEditor(script); showScreen('editor'); }
        } else if (del) {
          if (confirm('Delete this script?')) {
            await db.delete(parseInt(del.dataset.id));
            await loadLibrary();
          }
        }
      });

      document.getElementById('btn-new-script').addEventListener('click', () => {
        currentScript = {
          title: '', body: '',
          fontSize: 24, speed: 5,
          scrollDirection: 'tb', textAlign: 'left',
          createdAt: Date.now(), updatedAt: Date.now()
        };
        populateEditor(currentScript);
        showScreen('editor');
      });

      // ============ Editor ============
      function populateEditor(s) {
        document.getElementById('edit-title').value = s.title || '';
        document.getElementById('edit-body').value = s.body || '';
        document.getElementById('font-size').value = s.fontSize || 24;
        document.getElementById('font-size-val').textContent = (s.fontSize || 24) + 'px';
        document.getElementById('scroll-speed').value = s.speed || 5;
        document.getElementById('scroll-speed-val').textContent = s.speed || 5;
        const preview = document.getElementById('editor-preview');
        preview.style.fontSize = (s.fontSize || 24) + 'px';
        preview.style.textAlign = s.textAlign || 'left';

        document.querySelectorAll('.seg-btn').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.dir === s.scrollDirection) b.classList.add('active');
          if (b.dataset.align === s.textAlign) b.classList.add('active');
        });
        document.getElementById('validation-msg').classList.add('hidden');
      }

      document.getElementById('btn-back').addEventListener('click', () => showScreen('library'));

      document.getElementById('settings-toggle').addEventListener('click', () => {
        document.getElementById('settings-content').classList.toggle('collapsed');
      });

      document.getElementById('font-size').addEventListener('input', (e) => {
        const v = e.target.value;
        document.getElementById('font-size-val').textContent = v + 'px';
        document.getElementById('editor-preview').style.fontSize = v + 'px';
        if (currentScript) currentScript.fontSize = parseInt(v);
      });

      document.getElementById('scroll-speed').addEventListener('input', (e) => {
        const v = e.target.value;
        document.getElementById('scroll-speed-val').textContent = v;
        if (currentScript) currentScript.speed = parseInt(v);
      });

      document.querySelectorAll('.seg-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const parent = btn.parentElement;
          parent.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if (btn.dataset.dir && currentScript) currentScript.scrollDirection = btn.dataset.dir;
          if (btn.dataset.align && currentScript) {
            currentScript.textAlign = btn.dataset.align;
            document.getElementById('editor-preview').style.textAlign = btn.dataset.align;
          }
        });
      });

      function validateScript() {
        const body = document.getElementById('edit-body').value.trim();
        const msg = document.getElementById('validation-msg');
        if (!body) { msg.classList.remove('hidden'); return false; }
        msg.classList.add('hidden');
        return true;
      }

      async function saveCurrentScript() {
        currentScript.title = document.getElementById('edit-title').value.trim() || 'Untitled';
        currentScript.body = document.getElementById('edit-body').value;
        currentScript.updatedAt = Date.now();
        if (!currentScript.createdAt) currentScript.createdAt = Date.now();
        const id = await db.put(currentScript);
        currentScript.id = id;
      }

      document.getElementById('btn-save').addEventListener('click', async () => {
        if (!validateScript()) return;
        await saveCurrentScript();
        showScreen('library');
        await loadLibrary();
      });

      document.getElementById('btn-launch').addEventListener('click', async () => {
        if (!validateScript()) return;
        await saveCurrentScript();
        launchPrompter(currentScript);
      });

      // ============ Recording ============
      function getBestMimeType() {
        const types = [
          'video/webm;codecs=vp9',
          'video/webm;codecs=vp8',
          'video/webm',
          'video/mp4'
        ];
        for (const t of types) {
          if (MediaRecorder.isTypeSupported(t)) return t;
        }
        return '';
      }

      function startRecording() {
        if (!cameraState.stream) return;
        recordState.chunks = [];
        const mimeType = getBestMimeType();
        const options = {};
        if (mimeType) options.mimeType = mimeType;
        if (mimeType.includes('vp9') || mimeType.includes('vp8') || mimeType.includes('webm')) {
          options.videoBitsPerSecond = 8000000;
        }
        try {
          recordState.mediaRecorder = new MediaRecorder(cameraState.stream, options);
        } catch (e) {
          recordState.mediaRecorder = new MediaRecorder(cameraState.stream);
        }
        recordState.mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordState.chunks.push(e.data);
        };
        recordState.mediaRecorder.onstop = () => {
          const blob = new Blob(recordState.chunks, { type: recordState.mediaRecorder.mimeType || 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `eddyprompter-recording-${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        };
        recordState.mediaRecorder.start();
        recordState.isRecording = true;
        document.getElementById('btn-record').textContent = '⏹';
        document.getElementById('btn-record').classList.add('recording');
      }

      function stopRecording() {
        if (recordState.mediaRecorder && recordState.mediaRecorder.state !== 'inactive') {
          recordState.mediaRecorder.stop();
        }
        recordState.isRecording = false;
        document.getElementById('btn-record').textContent = '⏺';
        document.getElementById('btn-record').classList.remove('recording');
      }

      // ============ Prompter ============
      function renderScriptText(body, stumbled) {
        const container = document.getElementById('script-text');
        container.innerHTML = '';
        const words = body.split(/\s+/).filter(w => w.length > 0);
        const frag = document.createDocumentFragment();
        words.forEach((w, i) => {
          const span = document.createElement('span');
          span.className = 'word';
          span.dataset.index = i;
          span.textContent = w;
          if (stumbled && stumbled.has(i)) span.classList.add('stumbled');
          frag.appendChild(span);
        });
        container.appendChild(frag);
        wordElements = Array.from(container.querySelectorAll('.word'));
        return words.length;
      }

      function highlightWord(index) {
        if (scrollState.lastHighlighted >= 0 && wordElements[scrollState.lastHighlighted]) {
          wordElements[scrollState.lastHighlighted].classList.remove('active');
        }
        if (wordElements[index]) {
          wordElements[index].classList.add('active');
          scrollState.lastHighlighted = index;
        }
      }

      function getCurrentWordIndex() {
        const focusLine = document.querySelector('.focus-line');
        const focusRect = focusLine.getBoundingClientRect();
        const focusY = focusRect.top + focusRect.height / 2;

        let left = 0, right = wordElements.length - 1;
        let closest = 0, minDist = Infinity;

        while (left <= right) {
          const mid = Math.floor((left + right) / 2);
          const rect = wordElements[mid].getBoundingClientRect();
          const wordY = rect.top + rect.height / 2;
          const dist = Math.abs(wordY - focusY);
          if (dist < minDist) { minDist = dist; closest = mid; }
          if (wordY < focusY) left = mid + 1;
          else right = mid - 1;
        }

        const start = Math.max(0, closest - 5);
        const end = Math.min(wordElements.length, closest + 5);
        for (let i = start; i < end; i++) {
          const rect = wordElements[i].getBoundingClientRect();
          const wordY = rect.top + rect.height / 2;
          const dist = Math.abs(wordY - focusY);
          if (dist < minDist) { minDist = dist; closest = i; }
        }
        return closest;
      }

      function updateProgress() {
        const pct = wordElements.length > 0 ? (scrollState.currentWord / wordElements.length) * 100 : 0;
        document.getElementById('progress-bar').style.width = pct + '%';
        const remaining = wordElements.length - scrollState.currentWord;
        document.getElementById('words-remaining').textContent = remaining + ' words left';
      }

      function restoreScrollPosition(wordIndex) {
        if (!wordElements[wordIndex]) return;
        const word = wordElements[wordIndex];
        const content = document.getElementById('overlay-content');
        const focusLine = content.querySelector('.focus-line');
        const focusRect = focusLine.getBoundingClientRect();
        const contentRect = content.getBoundingClientRect();
        const focusY = focusRect.top - contentRect.top + focusRect.height / 2;
        const wordRect = word.getBoundingClientRect();
        const wordY = wordRect.top - contentRect.top + wordRect.height / 2;
        content.scrollTop = wordY - focusY;
        scrollState.scrollTop = content.scrollTop;
        scrollState.currentWord = wordIndex;
        highlightWord(wordIndex);
      }

      async function startCamera() {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('unsupported');
          if (cameraState.stream) cameraState.stream.getTracks().forEach(t => t.stop());
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: cameraState.facingMode } });
          cameraState.stream = stream;
          document.getElementById('camera-feed').srcObject = stream;
          document.getElementById('camera-off-indicator').classList.add('hidden');
        } catch (e) {
          document.getElementById('camera-off-indicator').classList.remove('hidden');
        }
      }

      function stopCamera() {
        if (cameraState.stream) {
          cameraState.stream.getTracks().forEach(t => t.stop());
          cameraState.stream = null;
        }
        document.getElementById('camera-feed').srcObject = null;
      }

      function toggleCamera() {
        if (recordState.isRecording) stopRecording();
        cameraState.facingMode = cameraState.facingMode === 'environment' ? 'user' : 'environment';
        startCamera();
      }

      function markStumbledWords() {
        const center = scrollState.currentWord;
        for (let i = Math.max(0, center - 2); i <= Math.min(wordElements.length - 1, center + 2); i++) {
          scrollState.stumbledWords.add(i);
          if (wordElements[i]) wordElements[i].classList.add('stumbled');
        }
        if (currentScript) currentScript.stumbledWords = Array.from(scrollState.stumbledWords);
      }

      async function saveScrollPosition() {
        if (!currentScript) return;
        currentScript.scrollPosition = scrollState.currentWord;
        await db.put(currentScript);
      }

      async function saveOverlayPosition() {
        if (!currentScript) return;
        const overlay = document.getElementById('prompter-overlay');
        currentScript.overlayX = overlay.offsetLeft;
        currentScript.overlayY = overlay.offsetTop;
        currentScript.overlayWidth = overlay.offsetWidth;
        currentScript.overlayHeight = overlay.offsetHeight;
        await db.put(currentScript);
      }

      async function saveStumbledWords() {
        if (!currentScript) return;
        currentScript.stumbledWords = Array.from(scrollState.stumbledWords);
        await db.put(currentScript);
      }

      function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
          elapsedSeconds++;
          const m = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
          const s = (elapsedSeconds % 60).toString().padStart(2, '0');
          document.getElementById('timer').textContent = m + ':' + s;
        }, 1000);
      }

      function pause() {
        scrollState.isPlaying = false;
        if (scrollState.rafId) { cancelAnimationFrame(scrollState.rafId); scrollState.rafId = null; }
        document.getElementById('btn-play').textContent = '▶';
        clearInterval(timerInterval);
        timerInterval = null;
        if (scrollState.isRehearsal) markStumbledWords();
      }

      function play() {
        scrollState.isPlaying = true;
        scrollState.lastFrameTime = null;
        scrollState.rafId = requestAnimationFrame(animate);
        document.getElementById('btn-play').textContent = '⏸';
        startTimer();
      }

      function animate(timestamp) {
        if (!scrollState.isPlaying) return;
        if (!scrollState.lastFrameTime) scrollState.lastFrameTime = timestamp;
        const delta = Math.min((timestamp - scrollState.lastFrameTime) / 1000, 0.1);
        scrollState.lastFrameTime = timestamp;

        const factor = scrollState.isRehearsal ? scrollState.speed * 1.5 : scrollState.speed;
        const pxPerSec = factor * 28;

        const content = document.getElementById('overlay-content');
        const maxScroll = content.scrollHeight - content.clientHeight;

        if (scrollState.direction === 'tb') {
          scrollState.scrollTop += pxPerSec * delta;
          if (scrollState.scrollTop >= maxScroll) {
            scrollState.scrollTop = maxScroll;
            content.scrollTop = scrollState.scrollTop;
            updateWordAndProgress();
            pause();
            return;
          }
        } else {
          scrollState.scrollTop -= pxPerSec * delta;
          if (scrollState.scrollTop <= 0) {
            scrollState.scrollTop = 0;
            content.scrollTop = 0;
            updateWordAndProgress();
            pause();
            return;
          }
        }

        content.scrollTop = scrollState.scrollTop;
        updateWordAndProgress();
        scrollState.rafId = requestAnimationFrame(animate);
      }

      function updateWordAndProgress() {
        const nw = getCurrentWordIndex();
        if (nw !== scrollState.currentWord) {
          scrollState.currentWord = nw;
          highlightWord(nw);
        }
        updateProgress();
      }

      function launchPrompter(script) {
        showScreen('prompter');

        const overlay = document.getElementById('prompter-overlay');
        if (script.overlayX !== undefined) {
          overlay.style.left = script.overlayX + 'px';
          overlay.style.top = script.overlayY + 'px';
          overlay.style.width = script.overlayWidth + 'px';
          overlay.style.height = script.overlayHeight + 'px';
        } else {
          overlay.style.left = '5%';
          overlay.style.top = '28%';
          overlay.style.width = '90%';
          overlay.style.height = '42%';
        }

        const textContainer = document.getElementById('script-text');
        textContainer.style.fontSize = (script.fontSize || 24) + 'px';
        textContainer.style.textAlign = script.textAlign || 'left';
        textContainer.classList.remove('mirror');

        scrollState.stumbledWords = new Set(script.stumbledWords || []);
        scrollState.speed = script.speed || 5;
        scrollState.direction = script.scrollDirection || 'tb';
        scrollState.currentWord = script.scrollPosition || 0;
        scrollState.isRehearsal = false;
        scrollState.scrollTop = 0;
        scrollState.isPlaying = false;
        scrollState.lastHighlighted = -1;
        if (scrollState.rafId) { cancelAnimationFrame(scrollState.rafId); scrollState.rafId = null; }

        elapsedSeconds = 0;
        document.getElementById('timer').textContent = '00:00';
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('live-speed').value = scrollState.speed;
        document.getElementById('rehearsal-mode').checked = false;
        document.getElementById('btn-play').textContent = '▶';
        if (recordState.isRecording) stopRecording();

        renderScriptText(script.body, scrollState.stumbledWords);

        requestAnimationFrame(() => {
          const content = document.getElementById('overlay-content');
          const ch = content.clientHeight;
          textContainer.style.paddingTop = (ch * 0.45) + 'px';
          textContainer.style.paddingBottom = (ch * 0.45) + 'px';

          if (script.scrollPosition && wordElements[script.scrollPosition]) {
            restoreScrollPosition(script.scrollPosition);
          } else {
            highlightWord(0);
            scrollState.currentWord = 0;
          }
          updateProgress();
        });

        startCamera();
      }

      // Prompter Controls
      document.getElementById('btn-play').addEventListener('click', () => {
        if (scrollState.isPlaying) pause(); else play();
      });

      document.getElementById('btn-record').addEventListener('click', () => {
        if (recordState.isRecording) stopRecording(); else startRecording();
      });

      document.getElementById('btn-restart').addEventListener('click', () => {
        pause();
        elapsedSeconds = 0;
        document.getElementById('timer').textContent = '00:00';
        const content = document.getElementById('overlay-content');
        if (scrollState.direction === 'tb') {
          content.scrollTop = 0;
          scrollState.scrollTop = 0;
          scrollState.currentWord = 0;
        } else {
          const maxScroll = content.scrollHeight - content.clientHeight;
          content.scrollTop = maxScroll;
          scrollState.scrollTop = maxScroll;
          scrollState.currentWord = wordElements.length - 1;
        }
        highlightWord(scrollState.currentWord);
        updateProgress();
      });

      document.getElementById('btn-mirror').addEventListener('click', () => {
        document.getElementById('script-text').classList.toggle('mirror');
      });

      document.getElementById('btn-camera-toggle').addEventListener('click', toggleCamera);

      document.getElementById('btn-exit').addEventListener('click', async () => {
        pause();
        if (recordState.isRecording) stopRecording();
        await saveScrollPosition();
        await saveOverlayPosition();
        await saveStumbledWords();
        stopCamera();
        showScreen('library');
        await loadLibrary();
      });

      document.getElementById('live-speed').addEventListener('input', (e) => {
        scrollState.speed = parseInt(e.target.value);
      });

      document.getElementById('rehearsal-mode').addEventListener('change', (e) => {
        scrollState.isRehearsal = e.target.checked;
      });

      // Drag
      const overlay = document.getElementById('prompter-overlay');
      const app = document.getElementById('app');

      function startDrag(x, y, target) {
        const isHeader = target.closest('.overlay-header') || target.closest('.drag-handle');
        if (scrollState.isPlaying && !isHeader) dragState.pending = true;
        else dragState.active = true;

        dragState.startX = x;
        dragState.startY = y;
        dragState.startLeft = overlay.offsetLeft;
        dragState.startTop = overlay.offsetTop;
        dragState.moved = false;
      }

      function moveDrag(x, y) {
        if (!dragState.active && !dragState.pending) return;
        const dx = x - dragState.startX;
        const dy = y - dragState.startY;

        if (dragState.pending) {
          if (Math.abs(dx) > dragState.threshold || Math.abs(dy) > dragState.threshold) {
            dragState.pending = false;
            dragState.active = true;
          } else return;
        }

        dragState.moved = true;
        const maxLeft = app.clientWidth - overlay.offsetWidth;
        const maxTop = app.clientHeight - overlay.offsetHeight;
        overlay.style.left = clamp(dragState.startLeft + dx, 0, maxLeft) + 'px';
        overlay.style.top = clamp(dragState.startTop + dy, 0, maxTop) + 'px';
      }

      function endDrag() {
        if (dragState.moved) saveOverlayPosition();
        dragState.active = false;
        dragState.pending = false;
        dragState.moved = false;
      }

      overlay.addEventListener('touchstart', (e) => {
        if (e.target.closest('.resize-handle')) return;
        startDrag(e.touches[0].clientX, e.touches[0].clientY, e.target);
      }, { passive: false });

      overlay.addEventListener('touchmove', (e) => {
        if (dragState.active || dragState.pending) e.preventDefault();
        moveDrag(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      overlay.addEventListener('touchend', endDrag);

      overlay.addEventListener('mousedown', (e) => {
        if (e.target.closest('.resize-handle')) return;
        startDrag(e.clientX, e.clientY, e.target);
      });

      window.addEventListener('mousemove', (e) => {
        if (dragState.active || dragState.pending) moveDrag(e.clientX, e.clientY);
      });

      window.addEventListener('mouseup', endDrag);

      // Resize
      const resizeHandle = document.getElementById('resize-handle');

      function startResize(x, y) {
        resizeState.active = true;
        resizeState.startX = x;
        resizeState.startY = y;
        resizeState.startWidth = overlay.offsetWidth;
        resizeState.startHeight = overlay.offsetHeight;
      }

      function moveResize(x, y) {
        if (!resizeState.active) return;
        const dx = x - resizeState.startX;
        const dy = y - resizeState.startY;
        const newW = clamp(resizeState.startWidth + dx, 120, app.clientWidth - overlay.offsetLeft);
        const newH = clamp(resizeState.startHeight + dy, 100, app.clientHeight - overlay.offsetTop - 140);
        overlay.style.width = newW + 'px';
        overlay.style.height = newH + 'px';
      }

      function endResize() {
        if (resizeState.active) {
          const content = document.getElementById('overlay-content');
          const textContainer = document.getElementById('script-text');
          const ch = content.clientHeight;
          textContainer.style.paddingTop = (ch * 0.45) + 'px';
          textContainer.style.paddingBottom = (ch * 0.45) + 'px';
          saveOverlayPosition();
        }
        resizeState.active = false;
      }

      resizeHandle.addEventListener('touchstart', (e) => {
        e.stopPropagation();
        startResize(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      resizeHandle.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        startResize(e.clientX, e.clientY);
      });

      window.addEventListener('touchmove', (e) => {
        if (resizeState.active) moveResize(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      window.addEventListener('mousemove', (e) => {
        if (resizeState.active) moveResize(e.clientX, e.clientY);
      });

      window.addEventListener('touchend', endResize);
      window.addEventListener('mouseup', endResize);

      // Init
      async function init() {
        await db.init();
        await loadLibrary();
      }
      init();
    })();
  </script>
</body>
</html>
